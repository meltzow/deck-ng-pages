<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>deck NG</title>
    <meta
      name="description"
      content="deck NG is a bilingual Nextcloud Deck client for iPhone and Android with browser-based login, Kanban boards, card editing, and privacy-aware self-hosted workflows."
    />
    <meta property="og:title" content="deck NG" />
    <meta
      property="og:description"
      content="Nextcloud Deck on the go. Manage boards, cards, assignees, due dates, and workflows on your own Nextcloud server."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://meltzow.github.io/deck-ng-pages/" />
    <meta
      property="og:image"
      content="https://meltzow.github.io/deck-ng-pages/assets/site/icon.png"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="deck NG" />
    <meta
      name="twitter:description"
      content="A self-hosted Nextcloud Deck client for iPhone and Android."
    />
    <link rel="canonical" href="https://meltzow.github.io/deck-ng-pages/" />
    <link rel="icon" href="./assets/site/icon.png" type="image/png" />
    <link rel="stylesheet" href="./css/index.css" />
    <script defer src="./index.js"></script>
  </head>
  <body data-page="home">
    <div class="site-shell">
      <header class="site-header">
        <div class="brand-lockup">
          <a class="brand" href="./index.html" aria-label="deck NG home">
            <img src="./assets/site/logo.png" alt="deck NG logo" class="brand-logo" />
            <span class="brand-text">deck NG</span>
          </a>
          <p class="brand-tagline" id="header-tagline"></p>
        </div>

        <button
          class="menu-toggle"
          id="menu-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
        >
          <span></span>
          <span></span>
        </button>

        <nav class="site-nav" id="site-nav" aria-label="Primary">
          <a class="nav-link" data-nav="overview" href="./index.html#overview"></a>
          <a class="nav-link" data-nav="features" href="./index.html#features"></a>
          <a class="nav-link" data-nav="screens" href="./index.html#screens"></a>
          <a class="nav-link" data-nav="privacy" href="./privacy.html"></a>
          <a class="nav-link" data-nav="impressum" href="./impressum.html"></a>
        </nav>

        <div class="header-actions">
          <div class="lang-switcher" aria-label="Language selector">
            <button class="lang-btn" data-lang="de" type="button">DE</button>
            <button class="lang-btn" data-lang="en" type="button">EN</button>
          </div>
          <a
            class="button button-primary button-small"
            id="header-download"
            href="https://apps.apple.com/us/app/deck-ng/id6443334702"
            target="_blank"
            rel="noreferrer"
          ></a>
        </div>
      </header>

      <main>
        <section class="hero" id="overview">
          <div class="hero-copy">
            <p class="eyebrow" id="hero-eyebrow"></p>
            <h1 id="hero-title"></h1>
            <p class="hero-text" id="hero-text"></p>

            <div class="hero-actions">
              <a
                class="button button-primary"
                href="https://apps.apple.com/us/app/deck-ng/id6443334702"
                target="_blank"
                rel="noreferrer"
                id="hero-app-store"
              ></a>
              <a
                class="button button-secondary"
                href="https://play.google.com/store/apps/details?id=net.meltzow.deckng"
                target="_blank"
                rel="noreferrer"
                id="hero-play-store"
              ></a>
            </div>

            <ul class="hero-points" id="hero-points"></ul>
          </div>

          <div class="hero-visual">
            <div class="device-card">
              <img
                src="./assets/site/dashboard-screen.png"
                alt="deck NG dashboard screenshot"
                class="device-shot"
                id="hero-image"
              />
            </div>
            <div class="signal-card signal-card-top">
              <strong id="signal-login-value"></strong>
              <span id="signal-login-label"></span>
            </div>
            <div class="signal-card signal-card-bottom">
              <strong id="signal-board-value"></strong>
              <span id="signal-board-label"></span>
            </div>
          </div>
        </section>

        <section class="section metrics">
          <div class="section-heading">
            <p class="eyebrow" id="metrics-eyebrow"></p>
            <h2 id="metrics-title"></h2>
          </div>
          <div class="metric-grid" id="metric-grid"></div>
        </section>

        <section class="section features" id="features">
          <div class="section-heading">
            <p class="eyebrow" id="features-eyebrow"></p>
            <h2 id="features-title"></h2>
            <p class="section-text" id="features-text"></p>
          </div>
          <div class="feature-grid" id="feature-grid"></div>
        </section>

        <section class="section screenshots" id="screens">
          <div class="section-heading">
            <p class="eyebrow" id="screens-eyebrow"></p>
            <h2 id="screens-title"></h2>
            <p class="section-text" id="screens-text"></p>
          </div>
          <div class="screenshot-grid" id="screenshot-grid"></div>
        </section>

        <section class="section privacy-strip">
          <div class="privacy-card">
            <div class="section-heading section-heading-compact">
              <p class="eyebrow" id="privacy-eyebrow"></p>
              <h2 id="privacy-title"></h2>
            </div>
            <p class="section-text" id="privacy-text"></p>
            <ul class="privacy-list" id="privacy-list"></ul>
            <div class="inline-actions">
              <a class="text-link" href="./privacy.html" id="privacy-link"></a>
              <button class="text-link button-reset" type="button" id="privacy-consent"></button>
            </div>
          </div>
        </section>

        <section class="section download">
          <div class="section-heading">
            <p class="eyebrow" id="download-eyebrow"></p>
            <h2 id="download-title"></h2>
            <p class="section-text" id="download-text"></p>
          </div>
          <div class="download-grid" id="download-grid"></div>
        </section>
      </main>

      <footer class="site-footer">
        <div>
          <a class="brand brand-footer" href="./index.html">
            <img src="./assets/site/logo.png" alt="deck NG logo" class="brand-logo" />
            <span class="brand-text">deck NG</span>
          </a>
          <p class="footer-text" id="footer-text"></p>
        </div>

        <div class="footer-links">
          <a href="./privacy.html" id="footer-privacy"></a>
          <a href="./impressum.html" id="footer-impressum"></a>
          <a href="mailto:deck-ng@meltzow.net" id="footer-support"></a>
          <button class="button-reset footer-button" id="footer-consent" type="button"></button>
        </div>
      </footer>
    </div>

    <div class="consent-banner" id="consent-banner" hidden>
      <div>
        <p class="consent-title" id="consent-title"></p>
        <p class="consent-text" id="consent-text"></p>
      </div>
      <div class="consent-actions">
        <button class="button button-ghost" id="consent-decline" type="button"></button>
        <button class="button button-primary" id="consent-accept" type="button"></button>
      </div>
    </div>

    <dialog class="consent-dialog" id="consent-dialog">
      <form method="dialog" class="dialog-card">
        <div class="dialog-header">
          <h2 id="dialog-title"></h2>
          <button class="button-reset dialog-close" id="dialog-close" type="submit" aria-label="Close">
            ×
          </button>
        </div>
        <p class="dialog-text" id="dialog-text"></p>
        <div class="dialog-option">
          <div>
            <strong id="dialog-analytics-title"></strong>
            <p id="dialog-analytics-text"></p>
          </div>
          <label class="switch">
            <input type="checkbox" id="analytics-toggle" />
            <span class="switch-ui"></span>
          </label>
        </div>
        <div class="dialog-actions">
          <button class="button button-secondary" id="dialog-cancel" type="submit"></button>
          <button class="button button-primary" id="dialog-save" type="button"></button>
        </div>
      </form>
    </dialog>
  </body>
</html>
